<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Samstev Lensman — Professional photography capturing weddings, corporate events, documentary moments, and milestones." />
  <meta name="keywords" content="photography, lagos photographer, samstev lensman, samuel stephen, wedding photography, documentary photographer, event photography, corporate photography" />
  <meta name="author" content="Samuel Stephen" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="Samstev Lensman | Photography Portfolio" />
  <meta property="og:description" content="Professional photography capturing weddings, corporate events, documentary moments, and milestones." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://samstev.com" />
  <meta property="og:image" content="https://samstev.com/images/logo.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <title>Gallery — Samstev Lensman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../css/gallery.css" />
</head>
<body>

  <!-- ░░ CURSOR ░░ -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <!-- ░░ NAV ░░ -->
  <header class="nav" id="nav">
    <a href="../index.html" class="nav__logo">
      <img src="../images/logo.png" alt="Samstev Lensman" />
    </a>
    <nav class="nav__links" id="navLinks">
      <a href="../index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="gallery.html" style="color: var(--off-white);">Portfolio</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <a href="https://wa.me/2349037733412" class="nav__cta" target="_blank" rel="noopener">Book a Session</a>
    <button class="nav__burger" id="burger" aria-label="Menu">
      <span></span><span></span>
    </button>
  </header>

  <!-- ░░ INNER HERO ░░ -->
  <section class="section" style="padding-top: 180px; padding-bottom: 60px; background: var(--black);">
    <div class="gallery__header">
      <div class="reveal">
        <p class="eyebrow">The Complete Collection</p>
        <h1 class="section__title" style="font-size: clamp(48px, 8vw, 100px);">Portfolio</h1>
      </div>
      <div class="gallery__filters reveal" id="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="weddings" onclick="window.location.href='weddings.html'">Weddings</button>
        <button class="filter" data-filter="corporate" onclick="window.location.href='corporate.html'">Corporate</button>
        <button class="filter" data-filter="documentary" onclick="window.location.href='documentary.html'">Documentary</button>
        <button class="filter" data-filter="birthdays" onclick="window.location.href='birthdays.html'">Birthdays</button>
      </div>
    </div>

    <!-- Reusing the interlocking masonry grid logic from style.css -->
        <div class="gallery__bento reveal" id="galleryBento" style="margin-top: 48px;">
      <!-- JavaScript will inject images here dynamically 16 at a time -->
    </div>
    <div id="loadingSentry" style="font-family: var(--font-body); font-size:12px; letter-spacing:0.1em; text-transform:uppercase; text-align: center; color: var(--slate-light); margin-top: 48px; padding-bottom:48px;">
      <i class="fa-solid fa-circle-notch fa-spin"></i> Loading more shots...
    </div>
  </section>

  <!-- ░░ FOOTER ░░ -->
  <footer class="footer">
    <div class="footer__logo">
      <img src="../images/logo.png" alt="Samstev Lensman" />
    </div>
    <p class="footer__copy">© 2025 Samstev Lensman. All rights reserved.</p>
    <ul class="footer__nav">
      <li><a href="../index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="gallery.html" style="color: var(--off-white);">Portfolio</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </footer>

  <script src="../script.js"></script>
  <script src="../js/gallery-data.js"></script>
  <script src="../js/gallery-loader.js"></script>
</body>
</html>
