<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Samstev Lensman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;0,9..40,900;1,9..40,300;1,9..40,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <!-- ░░ CURSOR ░░ -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursorTrail"></div>

  <!-- ░░ NAV ░░ -->
  <header class="nav" id="nav">
    <a href="../index.html" class="nav__logo">
      <img src="../images/logo.png" alt="Samstev Lensman" />
    </a>
    <nav class="nav__links" id="navLinks">
      <a href="services.html">Services</a>
      <a href="gallery.html" style="color: var(--off-white);">Work</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </nav>
    <a href="https://wa.me/2349037733412" class="nav__cta" target="_blank" rel="noopener">Book a Session</a>
    <button class="nav__burger" id="burger" aria-label="Menu">
      <span></span><span></span>
    </button>
  </header>

  <!-- ░░ INNER HERO ░░ -->
  <section class="section" style="padding-top: 180px; padding-bottom: 60px; background: var(--black);">
    <div class="gallery__header">
      <div class="reveal">
        <p class="eyebrow">The Complete Collection</p>
        <h1 class="section__title" style="font-size: clamp(48px, 8vw, 100px);">Portfolio</h1>
      </div>
      <div class="gallery__filters reveal" id="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="weddings" onclick="window.location.href='weddings.html'">Weddings</button>
        <button class="filter" data-filter="corporate" onclick="window.location.href='corporate.html'">Corporate</button>
        <button class="filter" data-filter="documentary" onclick="window.location.href='documentary.html'">Documentary</button>
        <button class="filter" data-filter="birthdays" onclick="window.location.href='birthdays.html'">Birthdays</button>
      </div>
    </div>

    <!-- Reusing the interlocking masonry grid logic from style.css -->
    <div class="gallery__bento reveal" id="galleryBento" style="margin-top: 48px;">
      
      <!-- Row 1/2 mix -->
      <div class="g-cell" data-cat="weddings">
        <img src="../images/weddings/wedding_004.jpg" alt="Wedding" loading="lazy" />
        <span class="g-label">Weddings</span>
      </div>
      <div class="g-cell" data-cat="documentary">
        <img src="../images/documentary/documentary_004.jpg" alt="Documentary" loading="lazy" />
        <span class="g-label">Documentary</span>
      </div>
      <div class="g-cell" data-cat="corporate">
        <img src="../images/corporate/corporate_004.jpg" alt="Corporate" loading="lazy" />
        <span class="g-label">Corporate</span>
      </div>
      <div class="g-cell" data-cat="birthdays">
        <img src="../images/birthdays/birthday_004.jpg" alt="Birthday" loading="lazy" />
        <span class="g-label">Birthdays</span>
      </div>
      <div class="g-cell" data-cat="weddings">
        <img src="../images/weddings/wedding_005.jpg" alt="Wedding" loading="lazy" />
        <span class="g-label">Weddings</span>
      </div>
      <div class="g-cell" data-cat="birthdays">
        <img src="../images/birthdays/birthday_005.jpg" alt="Birthday" loading="lazy" />
        <span class="g-label">Birthdays</span>
      </div>

      <!-- Let's add 6 more to seamlessly interlock -->
      <div class="g-cell" data-cat="corporate">
        <img src="../images/corporate/corporate_005.jpg" alt="Corporate" loading="lazy" />
        <span class="g-label">Corporate</span>
      </div>
      <div class="g-cell" data-cat="weddings">
        <img src="../images/weddings/wedding_006.jpg" alt="Wedding" loading="lazy" />
        <span class="g-label">Weddings</span>
      </div>
      <div class="g-cell" data-cat="documentary">
        <img src="../images/documentary/documentary_005.jpg" alt="Documentary" loading="lazy" />
        <span class="g-label">Documentary</span>
      </div>
      <div class="g-cell" data-cat="birthdays">
        <img src="../images/birthdays/birthday_006.jpg" alt="Birthday" loading="lazy" />
        <span class="g-label">Birthdays</span>
      </div>
      <div class="g-cell" data-cat="weddings">
        <img src="../images/weddings/wedding_007.jpg" alt="Wedding" loading="lazy" />
        <span class="g-label">Weddings</span>
      </div>
      <div class="g-cell" data-cat="corporate">
        <img src="../images/corporate/corporate_006.jpg" alt="Corporate" loading="lazy" />
        <span class="g-label">Corporate</span>
      </div>
    </div>
  </section>

  <!-- ░░ FOOTER ░░ -->
  <footer class="footer">
    <div class="footer__logo">
      <img src="../images/logo.png" alt="Samstev Lensman" />
    </div>
    <p class="footer__copy">© 2025 Samstev Lensman. All rights reserved.</p>
    <ul class="footer__nav">
      <li><a href="about.html">About</a></li>
      <li><a href="gallery.html" style="color: var(--off-white);">Gallery</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </footer>

  <script src="../script.js"></script>
</body>
</html>
